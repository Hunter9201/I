<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latest Articles – The Lion Hunter</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ── RESET & VARIABLES ── */
        :root {
            --primary: #0b2b4a;
            --primary-light: #1a4a6e;
            --primary-dark: #071b2e;
            --gold: #c9a24b;
            --gold-light: #e8d5a3;
            --bg-body: #f0f3f7;
            --text-dark: #0f1a2b;
            --text-muted: #4a5a72;
            --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.10);
            --radius-sm: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ── WRAPPER ── */
        .page-wrapper {
            max-width: 1100px;
            width: 100%;
        }

        /* ── BACK LINK ── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-light);
            text-decoration: none;
            margin-bottom: 1.5rem;
            transition: gap 0.2s;
        }
        .back-link:hover {
            gap: 14px;
            color: var(--primary-dark);
        }

        /* ── ARTICLES SECTION (EXACTLY AS IN MAIN PAGE) ── */
        .articles-section {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: var(--radius-sm);
            padding: 1.2rem 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(201, 162, 75, 0.15);
            transition: box-shadow 0.2s;
        }
        .articles-section:hover {
            box-shadow: var(--shadow-md);
        }

        .articles-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px 16px;
            border-bottom: 2px solid rgba(201, 162, 75, 0.25);
            padding-bottom: 10px;
            margin-bottom: 16px;
        }
        .articles-header h3 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary-dark);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .articles-header h3 i {
            color: var(--gold);
        }
        .articles-header .badge-new {
            background: var(--gold);
            color: var(--primary-dark);
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 14px;
            border-radius: 40px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }
        @media (max-width: 500px) {
            .articles-grid {
                grid-template-columns: 1fr;
            }
        }

        .article-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(2px);
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            border-left: 4px solid var(--gold);
            box-shadow: var(--shadow-sm);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-left-color: var(--primary-light);
        }
        .article-card .art-tag {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gold);
            background: rgba(201, 162, 75, 0.15);
            padding: 2px 12px;
            border-radius: 40px;
            align-self: flex-start;
        }
        .article-card .art-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-dark);
            line-height: 1.3;
            margin: 2px 0;
        }
        .article-card .art-title a {
            color: var(--primary-dark);
            text-decoration: none;
            transition: color 0.2s;
        }
        .article-card .art-title a:hover {
            color: var(--gold);
        }
        .article-card .art-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .article-card .art-meta i {
            margin-right: 3px;
            color: var(--gold);
        }
        .article-card .art-summary {
            font-size: 0.8rem;
            color: var(--text-dark);
            line-height: 1.5;
            opacity: 0.85;
            margin-top: 2px;
        }
        .article-card .art-readmore {
            margin-top: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--primary-light);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            align-self: flex-start;
        }
        .article-card .art-readmore:hover {
            color: var(--gold);
            gap: 10px;
        }

        .articles-empty {
            text-align: center;
            padding: 2rem 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .articles-empty i {
            font-size: 2.4rem;
            color: var(--gold-light);
            display: block;
            margin-bottom: 10px;
        }

        /* ── FEATURED VARIANT (matches main page) ── */
        .article-card.border-l-4.border-l-amber-500 {
            border-left-color: #f59e0b;
        }

        /* ── FOOTER ── */
        .footer-note {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(201, 162, 75, 0.2);
            padding-top: 1rem;
        }
        .footer-note a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
        }
        .footer-note a:hover {
            color: var(--gold);
        }
    </style>
</head>
<body>

    <div class="page-wrapper">

        <!-- Back link (optional) -->
        <a href="#" class="back-link" onclick="history.back(); return false;">
            <i class="fas fa-arrow-left"></i> Back to Portal
        </a>

        <!-- ===== ARTICLES SECTION ===== -->
        <section class="articles-section" id="articles-section">
            <div class="articles-header">
                <h3><i class="fas fa-newspaper"></i> Latest Articles</h3>
                <span class="badge-new"><i class="fas fa-feather-alt"></i> Fresh insights</span>
            </div>

            <div class="articles-grid" id="articlesGrid">
                <!-- Article cards will be injected by JavaScript -->
                <div class="articles-empty">
                    <i class="fas fa-pen-fancy"></i>
                    <p>Loading articles…</p>
                </div>
            </div>

            <div style="text-align:right; margin-top:14px;">
                <a href="#" style="font-size:0.8rem; font-weight:700; color:var(--primary-light); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:gap 0.2s;">
                    <i class="fas fa-arrow-right"></i> Browse all articles
                </a>
            </div>
        </section>

        <div class="footer-note">
            <i class="fas fa-gavel" style="color:var(--gold);"></i> The Lion Hunter &middot; Legal clarity for the pride
        </div>
    </div>

    <!-- ================================================================ -->
    <!-- ARTICLES DATA & RENDERER (identical to main page)               -->
    <!-- ================================================================ -->
    <script>
        (function() {
            // ─── ARTICLE DATA ──────────────────────────────────────────────
            // Add, remove, or edit articles in this array.
            const articles = [{
                id: 1,
                title: "The Art of Cross-Examination: Lessons from the Savannah",
                tag: "Advocacy",
                date: "27 June 2026",
                author: "Arthur M.",
                summary: "Master the techniques that turn a courtroom into a hunting ground. Discover how to trap, pivot, and strike with precision.",
                link: "#",
                featured: true
            }, {
                id: 2,
                title: "Decoding the Ugandan Land Law: A Practical Guide",
                tag: "Legal Analysis",
                date: "25 June 2026",
                author: "Sarah K.",
                summary: "Land disputes are the lion's share of Ugandan litigation. This article breaks down the key statutes and recent judicial trends.",
                link: "#",
                featured: false
            }, {
                id: 3,
                title: "Ethical Dilemmas in Criminal Defense",
                tag: "Ethics",
                date: "22 June 2026",
                author: "Dr. James O.",
                summary: "Balancing zealous advocacy with professional integrity — a must-read for every defense lawyer navigating the wild.",
                link: "#",
                featured: false
            }, {
                id: 4,
                title: "From Paper to Practice: Building a Strong Legal Argument",
                tag: "Skill Building",
                date: "20 June 2026",
                author: "Grace N.",
                summary: "Learn how to structure persuasive submissions that judges remember. Practical tips from seasoned practitioners.",
                link: "#",
                featured: false
            }, {
                id: 5,
                title: "The Future of Legal Tech in East Africa",
                tag: "Innovation",
                date: "18 June 2026",
                author: "Team Lion Hunt",
                summary: "AI, automation, and digital case management — how technology is reshaping the legal landscape in the region.",
                link: "#",
                featured: false
            }, {
                id: 6,
                title: "Winning the Moot: Strategies for LDC Students",
                tag: "Mooting",
                date: "15 June 2026",
                author: "Brian W.",
                summary: "From research to oral delivery, this guide gives you the edge in mooting competitions. Roar with confidence.",
                link: "#",
                featured: false
            }];

            // ─── RENDER FUNCTION ──────────────────────────────────────────
            function renderArticles() {
                const grid = document.getElementById('articlesGrid');
                if (!grid) return;

                if (!articles || articles.length === 0) {
                    grid.innerHTML = `
                        <div class="articles-empty">
                            <i class="fas fa-pen-fancy"></i>
                            <p>No articles yet. Check back soon!</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                for (const art of articles) {
                    const featuredClass = art.featured ? ' border-l-4 border-l-amber-500' : '';
                    const linkTarget = art.link && art.link !== '#' ? art.link : '#';
                    html += `
                        <div class="article-card${featuredClass}">
                            ${art.tag ? `<span class="art-tag"><i class="fas fa-tag"></i> ${art.tag}</span>` : ''}
                            <div class="art-title">
                                <a href="${linkTarget}" ${art.link && art.link !== '#' ? 'target="_blank" rel="noopener"' : ''}>
                                    ${art.title}
                                </a>
                            </div>
                            <div class="art-meta">
                                <span><i class="far fa-calendar-alt"></i> ${art.date || ''}</span>
                                ${art.author ? `<span><i class="far fa-user"></i> ${art.author}</span>` : ''}
                            </div>
                            ${art.summary ? `<div class="art-summary">${art.summary}</div>` : ''}
                            <a href="${linkTarget}" class="art-readmore" ${art.link && art.link !== '#' ? 'target="_blank" rel="noopener"' : ''}>
                                Read more <i class="fas fa-arrow-right"></i>
                            </a>
                        </div>
                    `;
                }

                grid.innerHTML = html;
            }

            // ─── INIT ──────────────────────────────────────────────────────
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', renderArticles);
            } else {
                renderArticles();
            }

            // Expose articles globally for easy tweaking in dev tools.
            window.__lionArticles = articles;
        })();
    </script>

</body>
</html>
